name: Update public events

on:
  schedule:
    - cron: "0 13 * * 3"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-public-events
  cancel-in-progress: false

jobs:
  update-public-events:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull --ff-only origin "${GITHUB_REF_NAME}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Update PublicEvents.json
        run: python3 scripts/update_public_events.py

      - name: Validate public events
        run: python3 scripts/validate_public_events.py

      - name: Push changes
        run: |
          if git diff --quiet -- PublicEvents.json; then
            echo "No public event updates to push."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PublicEvents.json
          git commit -m "Update public events"
          git push origin "HEAD:${GITHUB_REF_NAME}"
