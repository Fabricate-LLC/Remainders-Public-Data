name: Validate public events

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-public-events-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate catalog
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate PublicEvents.json
        run: python3 scripts/validate_public_events.py
